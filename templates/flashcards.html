{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 2rem auto;">
    <h2>Flashcard Quizzer</h2>
    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; color: #fca5a5;">
        {{ error }}
    </div>
    {% endif %}
    <form action="/flashcards" method="POST">
        <div class="form-group">
            <label>Topic</label>
            <input type="text" name="topic" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Generate</button>
    </form>
</div>
{% endblock %}
