{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <h2>Topic: {{ topic }}</h2>
    <div id="deck">
        {% for card in cards %}
        <div class="flashcard-container {% if loop.index == 1 %}active{% else %}hidden{% endif %}">
            <div class="flashcard" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-front"><h3>{{ card.question }}</h3></div>
                <div class="flashcard-back"><p>{{ card.answer }}</p></div>
            </div>
        </div>
        {% endfor %}
    </div>
    <div id="score-summary" class="hidden" style="text-align: center; padding: 2rem; background: var(--surface-2); border-radius: var(--radius); border: 1px solid var(--border-light); margin-top: 1rem;">
        <h3>Session Complete! 🎉</h3>
        <p style="font-size: 1.2rem; margin: 1rem 0;">You got <strong id="score-display">0</strong> out of {{ cards|length }} correct.</p>
        <button class="btn btn-primary" onclick="location.reload()">Restart Deck</button>
        <a href="/flashcards" class="btn btn-outline" style="margin-left: 10px;">New Topic</a>
    </div>

    <div id="controls" style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;">
        <button class="btn btn-outline" onclick="markCard(false)" style="flex: 1;">🔄 Needs Review</button>
        <button class="btn btn-primary" onclick="markCard(true)" style="flex: 1;">👍 Got It!</button>
    </div>
    
    <div id="nav-controls" style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;">
        <button class="btn btn-outline" onclick="move(-1)">Prev</button>
        <button class="btn btn-outline" onclick="move(1)">Next</button>
    </div>

    <div style="text-align: center; margin-top: 2rem;">
        <button class="btn btn-outline" onclick="downloadCSV()">⬇️ Download as CSV (Anki)</button>
    </div>
</div>
<style>.hidden { display: none; } .active { display: block; }</style>
<script>
    let idx = 0;
    const cards = document.querySelectorAll('.flashcard-container');
    function move(dir) {
        cards[idx].classList.replace('active', 'hidden');
        idx = (idx + dir + cards.length) % cards.length;
        cards[idx].classList.replace('hidden', 'active');
    }

    const reviewedSet = new Set();
    let score = 0;
    const totalCards = {{ cards|length }};

    function markCard(gotIt) {
        if (!reviewedSet.has(idx)) {
            reviewedSet.add(idx);
            if (gotIt) score++;
        }
        
        if (reviewedSet.size >= totalCards) {
            document.getElementById('deck').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'none';
            document.getElementById('score-summary').classList.replace('hidden', 'active');
            document.getElementById('score-display').innerText = score;
        } else {
            move(1);
        }
    }

    const flashcardsData = {{ cards | tojson | safe }};
    function downloadCSV() {
        let csvContent = "data:text/csv;charset=utf-8,Question,Answer\n";
        flashcardsData.forEach(card => {
            let q = card.question.replace(/"/g, '""');
            let a = card.answer.replace(/"/g, '""');
            csvContent += `"${q}","${a}"\n`;
        });
        var encodedUri = encodeURI(csvContent);
        var link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "flashcards.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
{% endblock %}
