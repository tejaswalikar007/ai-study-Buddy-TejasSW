{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 2rem auto;">
    <h2>AI Tutor (QA)</h2>
    <form action="/answer-question" method="POST">
        <div class="form-group"><label>Context</label><textarea name="context" rows="8" required></textarea></div>
        <div class="form-group"><label>Question</label><input type="text" name="question" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Get Answer</button>
    </form>
</div>
{% endblock %}
