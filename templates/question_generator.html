{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 2rem auto;">
    <h2>Question Generator</h2>
    <form action="/question-generator" method="POST">
        <div class="form-group"><label>Text Content</label><textarea name="paragraph" rows="10" required></textarea></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Generate</button>
    </form>
</div>
{% endblock %}
