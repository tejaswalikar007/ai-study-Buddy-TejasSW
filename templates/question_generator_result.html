{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 2rem auto;">
    <h2>Generated Questions</h2>
    <ul>
        {% for q in questions %}
        <li style="margin-bottom: 1rem; font-size: 1.1rem;">{{ q }}</li>
        {% endfor %}
    </ul>
    <a href="/question-generator" class="btn btn-outline" style="margin-top: 2rem;">More</a>
</div>
{% endblock %}
