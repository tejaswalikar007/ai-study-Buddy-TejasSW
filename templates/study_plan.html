{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 2rem auto;">
    <h2>Study Plan</h2>
    <form action="/study-plan" method="POST">
        <div class="form-group"><label>Syllabus</label><input type="text" name="syllabus" required></div>
        <div class="form-group"><label>Topics</label><textarea name="topics" required></textarea></div>
        <div class="form-group"><label>Start Date</label><input type="date" name="start_date" required></div>
        <div class="form-group"><label>Deadline</label><input type="date" name="deadline" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Plan</button>
    </form>
</div>
{% endblock %}
