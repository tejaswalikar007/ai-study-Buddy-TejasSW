{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 2rem auto;">
    <h2>Your Study Plan</h2>
    <div class="markdown-content">
        <textarea style="display: none;">{{ study_plan }}</textarea>
        <div class="rendered-html"></div>
    </div>
    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
        <a href="/study-plan" class="btn btn-outline">New Plan</a>
        <button class="btn btn-primary" onclick="downloadTXT()">⬇️ Download TXT</button>
    </div>
</div>
<script>
    function downloadTXT() {
        const rawText = document.querySelector('textarea').value;
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(rawText));
        element.setAttribute('download', 'study_plan.txt');
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }
</script>
{% endblock %}
