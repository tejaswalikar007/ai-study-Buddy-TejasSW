{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 2rem auto;">
    <h2>Smart Summarizer 2.0</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Summarize long text or web articles instantly.</p>
    
    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; color: #fca5a5;">
        {{ error }}
    </div>
    {% endif %}

    <form action="/summarizer" method="POST">
        <div class="form-group">
            <label>Option 1: Paste a Web Link (URL)</label>
            <input type="text" name="url" placeholder="https://example.com/article">
        </div>
        
        <div style="text-align: center; margin: 1rem 0; color: var(--text-muted); font-weight: bold;">— OR —</div>
        
        <div class="form-group">
            <label>Option 2: Paste Text Content</label>
            <textarea name="user_text" rows="10" placeholder="Paste your text here..."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Summarize Now</button>
    </form>
</div>
{% endblock %}
