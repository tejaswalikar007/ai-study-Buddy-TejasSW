{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 2rem auto;">
    <h2>Summary</h2>
    <div class="markdown-content">
        <textarea style="display: none;">{{ summary }}</textarea>
        <div class="rendered-html"></div>
    </div>
    <div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
        <a href="/summarizer" class="btn btn-outline">New Summary</a>
        <button class="btn btn-primary" onclick="downloadTXT()">⬇️ Download TXT</button>
        <button class="btn btn-outline" id="readAloudBtn" onclick="toggleReadAloud()">🔊 Read Aloud</button>
    </div>
</div>
<script>
    function downloadTXT() {
        const rawText = document.querySelector('textarea').value;
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(rawText));
        element.setAttribute('download', 'summary.txt');
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    let isSpeaking = false;
    function toggleReadAloud() {
        const btn = document.getElementById('readAloudBtn');
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            btn.innerHTML = '🔊 Read Aloud';
        } else {
            const rawText = document.querySelector('textarea').value;
            // Clean markdown hashes/stars for better reading
            const cleanText = rawText.replace(/[#*`_]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.onend = () => {
                isSpeaking = false;
                btn.innerHTML = '🔊 Read Aloud';
            };
            window.speechSynthesis.speak(utterance);
            isSpeaking = true;
            btn.innerHTML = '🔇 Stop Reading';
        }
    }
    
    // Stop reading when leaving page
    window.addEventListener('beforeunload', () => {
        window.speechSynthesis.cancel();
    });
</script>
{% endblock %}
