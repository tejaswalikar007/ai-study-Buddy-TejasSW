{% extends "base.html" %}
{% block title %}Upload PDF - AI Study Buddy{% endblock %}

{% block content %}
<div class="hero">
    <h1>📄 Upload PDF</h1>
    <p>Upload your textbook or notes to instantly summarize them, generate flashcards, or chat with them.</p>
</div>

<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    {% if error %}
    <div style="background: var(--danger-bg); border: 1px solid var(--danger-border); padding: 12px; border-radius: var(--radius); margin-bottom: 20px; color: var(--danger-text);">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="pdf_file">Select PDF Document</label>
            <input type="file" id="pdf_file" name="pdf_file" accept=".pdf" required style="padding: 10px; background: transparent; border: 1px dashed var(--border-light); cursor: pointer;">
        </div>
        
        <div class="form-group" style="margin-top: 1.5rem;">
            <label for="action">What would you like to do?</label>
            <select id="action" name="action" required style="width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border-light); border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; -webkit-appearance: none; appearance: none;">
                <option value="summarize">📝 Summarize the Document</option>
                <option value="flashcards">🃏 Generate Flashcards</option>
                <option value="qa">💬 Send to Q&A Chat</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Process PDF 🚀</button>
    </form>
</div>
{% endblock %}
