{% extends "base.html" %}
{% block title %}Visual QA Result — AI Study Buddy{% endblock %}
{% block content %}

<div style="max-width: 800px; margin: 2rem auto; display: flex; flex-direction: column; gap: 20px;">

  <!-- Question header -->
  <div style="display: flex; align-items: flex-start; gap: 14px;">
    <div style="flex: 1;">
      <p style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
                text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px;">
        Your Question
      </p>
      <h2 style="font-size: 1.4rem; margin-bottom: 0;">{{ question }}</h2>
    </div>
  </div>

  <!-- Two-column layout: image | answer -->
  <div class="vqa-layout">

    <!-- Uploaded image -->
    <div class="glass-card vqa-image-card">
      <p style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
                text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;">
        Uploaded Image
      </p>
      <img src="data:{{ mime_type }};base64,{{ image_b64 }}"
           alt="Uploaded image"
           style="width: 100%; border-radius: 4px; border: 1px solid var(--border); display: block;">
    </div>

    <!-- Gemini answer -->
    <div class="glass-card vqa-answer-card">
      <p style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
                text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;">
        Gemini Vision Answer
      </p>
      <div class="markdown-content">{{ answer }}</div>
    </div>

  </div>

  <!-- Actions -->
  <div style="display: flex; gap: 10px; flex-wrap: wrap;">
    <a href="/visual-qa" class="btn btn-primary">Ask Another Question</a>
    <button onclick="copyAnswer()" class="btn btn-outline" id="copy-btn">Copy Answer</button>
  </div>

</div>

<!-- ── Styles ───────────────────────────────────────────────── -->
<style>
  .vqa-layout {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 20px;
    align-items: start;
  }

  .vqa-image-card,
  .vqa-answer-card {
    padding: 24px !important;
  }

  @media (max-width: 680px) {
    .vqa-layout { grid-template-columns: 1fr; }
  }
</style>

<!-- ── Script ───────────────────────────────────────────────── -->
<script>
  // Render markdown in answer block
  document.querySelectorAll('.markdown-content').forEach(el => {
    el.innerHTML = marked.parse(el.innerText);
  });

  function copyAnswer() {
    const text = document.querySelector('.vqa-answer-card .markdown-content').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Answer', 2000);
    });
  }
</script>

{% endblock %}
